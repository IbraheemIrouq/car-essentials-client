<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Essentials – Register</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <p class="auth-bg-text">What if your car could listen... respond... and make driving simpler?</p>

  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Register</h1>

      <div id="successMsg" class="success-msg"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <input type="text" id="username" class="form-input" placeholder="Username">
          <span class="field-error" id="usernameError">Username is required</span>
        </div>
        <div class="form-group">
          <input type="email" id="email" class="form-input" placeholder="username@example.com">
          <span class="field-error" id="emailError">Please enter a valid email address</span>
        </div>
        <div class="form-group">
          <input type="password" id="password" class="form-input" placeholder="Password">
          <span class="field-error" id="passwordError">Password must be at least 6 characters</span>
        </div>
        <div class="form-group">
          <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm Password">
          <span class="field-error" id="confirmError">Passwords do not match</span>
        </div>
        <div class="form-group">
          <input type="tel" id="phone" class="form-input" placeholder="Phone (optional)">
        </div>
        <button type="submit" class="btn btn-blue btn-full">Create Account</button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="index.html">Login</a>
      </div>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
